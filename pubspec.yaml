name: habitflow
description: HabitFlow Phase 2 - Reminders, Insights, Challenges & Animations
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  permission_handler: ^11.1.0

  # UI & Fonts
  google_fonts: ^6.1.0
  gap: ^3.0.1
  fl_chart: ^0.68.0

  # Utils
  uuid: ^4.2.2
  intl: ^0.18.1
  collection: ^1.18.0
  shared_preferences: ^2.2.2
  supabase_flutter: ^2.12.4
  connectivity_plus: ^7.1.1
  flutter_svg: ^2.3.0
  flutter_native_timezone: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
  - assets/png/
  - assets/svg/
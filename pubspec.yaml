name: health_tracker
description: Full-featured health tracking app
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  pedometer: ^4.0.2
  health: ^13.3.1
  fl_chart: ^0.66.2
  flutter_local_notifications: ^17.0.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
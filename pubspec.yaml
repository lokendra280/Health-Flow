name: habitflow
description: HabitFlow Phase 2 - Reminders, Insights, Challenges & Animations
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^22.0.0  
  timezone: ^0.11.0
  permission_handler: ^11.1.0

  # UI & Fonts
  google_fonts: ^6.1.0
  gap: ^3.0.1
  fl_chart: ^0.68.0

  # Utils
  uuid: ^4.2.2
  intl: ^0.18.1
  collection: ^1.18.0
  shared_preferences: ^2.2.2
  supabase_flutter: ^2.12.4
  connectivity_plus: ^7.1.1
  flutter_svg: ^2.3.0
  flutter_launcher_icons: ^0.14.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: "assets/app_icon.png"
  image_path_ios: "assets/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/app_icon.png"

  min_sdk_android: 33
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  cupertino_icons: ^1.0.8

flutter:
  uses-material-design: true
  assets:
  - assets/png/
  - assets/svg/